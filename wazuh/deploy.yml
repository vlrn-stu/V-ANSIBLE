---
# wazuh-proxmox-deployment.yml
# Ansible playbook to deploy Wazuh on Proxmox using Alpine Linux and Docker Compose

- name: Deploy Wazuh on Proxmox using Alpine Linux and Docker Compose
  hosts: localhost
  gather_facts: false
  vars_prompt:
    - name: "vm_name"
      prompt: "Enter the name of the VM"
      default: "wazuh"
    - name: "vm_id"
      prompt: "Enter the VM ID"
      default: 100
    - name: "vm_cores"
      prompt: "Enter the number of CPU cores for the VM"
      default: 2
    - name: "vm_memory"
      prompt: "Enter the memory size (in MB) for the VM"
      default: 4096
    - name: "vm_disk_size"
      prompt: "Enter the disk size for the VM (e.g., 20G)"
      default: "20G"
    - name: "vm_storage"
      prompt: "Enter the storage location for the VM (e.g., local-lvm)"
      default: "local-lvm"
    - name: "alpine_iso_url"
      prompt: "Enter the Alpine Linux ISO URL to use"
      default: "https://dl-cdn.alpinelinux.org/alpine/v3.18/releases/x86_64/alpine-standard-3.18.0-x86_64.iso"
    - name: "vm_ip"
      prompt: "Enter the IP address for the VM"
      private: no
    - name: "vm_root_password"
      prompt: "Enter the root password for the VM"
      private: yes
  
  vars:
    alpine_iso_name: "alpine-3.18.iso"
    
  tasks:
    - name: Gather information about existing VMs
      shell: qm list --full
      register: vm_list_output
      changed_when: false
    
    - name: Display existing VMs
      debug:
        msg: "{{ vm_list_output.stdout_lines }}"
    
    - name: Check if Alpine Linux ISO already exists
      stat:
        path: "/var/lib/vz/template/iso/{{ alpine_iso_name }}"
      register: iso_file
    
    - name: Download Alpine Linux ISO if not already present
      get_url:
        url: "{{ alpine_iso_url }}"
        dest: "/var/lib/vz/template/iso/{{ alpine_iso_name }}"
        mode: '0644'
      when: not iso_file.stat.exists
    
    - name: Verify ISO file exists in Proxmox storage
      stat:
        path: "/var/lib/vz/template/iso/{{ alpine_iso_name }}"
      register: iso_check
      failed_when: not iso_check.stat.exists
    
    - name: Check if VM with specified ID already exists
      shell: qm status {{ vm_id }} || echo "NotFound"
      register: vm_exists
      changed_when: false
      failed_when: false
    
    - name: Create a new VM on Proxmox
      shell: |
        qm create {{ vm_id }} \
          --name {{ vm_name }} \
          --memory {{ vm_memory }} \
          --cores {{ vm_cores }} \
          --net0 virtio,bridge=vmbr0 \
          --ide2 local:iso/{{ alpine_iso_name }},media=cdrom \
          --scsihw virtio-scsi-pci
      when: "'NotFound' in vm_exists.stdout"
      register: vm_created
    
    - name: Add disk to VM
      shell: |
        qm set {{ vm_id }} --scsi0 {{ vm_storage }}:{{ vm_disk_size }}
      when: vm_created is defined and vm_created.changed
    
    - name: Configure boot options
      shell: |
        qm set {{ vm_id }} --boot c --bootdisk scsi0 --serial0 socket --vga serial0
      when: vm_created is defined and vm_created.changed
    
    - name: Start the VM
      shell: qm start {{ vm_id }}
      when: "'NotFound' in vm_exists.stdout"
      register: vm_started
    
    - name: Wait for VM to complete initial boot (30 seconds)
      pause:
        seconds: 30
      when: vm_started is defined and vm_started.changed
    
    # This creates a template for the basic Alpine installation
    # The next steps require manual installation first time, after which we can use
    # subsequent automation to configure
    
    - name: Provide instructions for Alpine Linux installation
      debug:
        msg: |
          Please complete the Alpine Linux installation manually:
          
          1. Log in to the Proxmox console for VM {{ vm_id }}
          2. Log in with 'root' (no password)
          3. Run 'setup-alpine' and follow the prompts
          4. Configure network with IP: {{ vm_ip }}
          5. Set root password to your secure password
          6. When prompted for disk, choose 'sys' option to install to disk
          7. Select 'scsi0' as the disk to use
          8. Choose 'y' to erase the disk
          9. Complete installation and reboot
          
          After completing installation, press Enter to continue with automation.
      when: vm_started is defined and vm_started.changed
    
    - name: Wait for user to complete Alpine installation
      pause:
        prompt: "Press Enter after you've completed the Alpine Linux installation"
      when: vm_started is defined and vm_started.changed
    
    - name: Wait for SSH to become available
      wait_for:
        host: "{{ vm_ip }}"
        port: 22
        delay: 10
        timeout: 300
      when: vm_ip is defined
    
    - name: Add Alpine VM to inventory
      add_host:
        name: "alpine_vm"
        ansible_host: "{{ vm_ip }}"
        ansible_user: "root"
        ansible_password: "{{ vm_root_password }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
      when: vm_ip is defined and vm_root_password is defined

- name: Configure Alpine Linux and Deploy Wazuh
  hosts: alpine_vm
  gather_facts: false
  
  tasks:
    - name: Update Alpine package repositories
      raw: apk update
    
    - name: Install Python for Ansible
      raw: apk add python3
    
    - name: Install essential packages
      raw: apk add docker docker-compose curl bash bash-completion sudo logrotate audit coreutils openssh-server
    
    - name: Configure Docker to start on boot
      raw: rc-update add docker default
    
    - name: Start Docker service
      raw: service docker start
    
    - name: Create Wazuh directory
      raw: mkdir -p /opt/wazuh
    
    - name: Configure automatic updates
      raw: |
        cat << 'EOF' > /etc/periodic/daily/system-update
        #!/bin/sh
        apk update && apk upgrade -y
        EOF
        chmod +x /etc/periodic/daily/system-update
    
    - name: Apply system hardening
      raw: |
        cat << 'EOF' > /etc/modprobe.d/disable-filesystems.conf
        install cramfs /bin/true
        install udf /bin/true
        install squashfs /bin/true
        install freevxfs /bin/true
        EOF
    
    - name: Apply network hardening
      raw: |
        echo "net.ipv4.conf.all.accept_redirects = 0" >> /etc/sysctl.conf
        echo "net.ipv4.conf.all.send_redirects = 0" >> /etc/sysctl.conf
        echo "net.ipv4.conf.all.accept_source_route = 0" >> /etc/sysctl.conf
        echo "net.ipv4.conf.all.log_martians = 1" >> /etc/sysctl.conf
        echo "net.ipv4.icmp_echo_ignore_broadcasts = 1" >> /etc/sysctl.conf
        sysctl -p
    
    - name: Deploy Wazuh Docker Compose file
      raw: |
        cat << 'EOF' > /opt/wazuh/docker-compose.yml
        version: '3'
        services:
          wazuh-manager:
            image: wazuh/wazuh-manager:4.5.1
            container_name: wazuh-manager
            hostname: wazuh-manager
            restart: always
            ports:
              - "1514:1514/udp"
              - "1515:1515"
              - "55000:55000"
            volumes:
              - wazuh_api_configuration:/var/ossec/api/configuration
              - wazuh_etc:/var/ossec/etc
              - wazuh_logs:/var/ossec/logs
              - wazuh_queue:/var/ossec/queue
              - wazuh_var_multigroups:/var/ossec/var/multigroups
              - wazuh_integrations:/var/ossec/integrations
              - wazuh_active_response:/var/ossec/active-response/bin
              - wazuh_agentless:/var/ossec/agentless
              - wazuh_wodles:/var/ossec/wodles
              - filebeat_etc:/etc/filebeat
              - filebeat_var:/var/lib/filebeat
            environment:
              - INDEXER_URL=https://wazuh-indexer:9200
              - INDEXER_USERNAME=admin
              - INDEXER_PASSWORD=SecretPassword
              - FILEBEAT_SSL_VERIFICATION=none
          
          wazuh-indexer:
            image: wazuh/wazuh-indexer:4.5.1
            container_name: wazuh-indexer
            hostname: wazuh-indexer
            restart: always
            ports:
              - "9200:9200"
            environment:
              - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
            ulimits:
              memlock:
                soft: -1
                hard: -1
              nofile:
                soft: 65536
                hard: 65536
            volumes:
              - wazuh-indexer-data:/var/lib/wazuh-indexer
          
          wazuh-dashboard:
            image: wazuh/wazuh-dashboard:4.5.1
            container_name: wazuh-dashboard
            hostname: wazuh-dashboard
            restart: always
            ports:
              - "443:5601"
            environment:
              - INDEXER_USERNAME=admin
              - INDEXER_PASSWORD=SecretPassword
              - WAZUH_API_URL=https://wazuh-manager
              - API_USERNAME=wazuh-wui
              - API_PASSWORD=wazuh-wui
            depends_on:
              - wazuh-indexer
              - wazuh-manager
        
        volumes:
          wazuh_api_configuration:
          wazuh_etc:
          wazuh_logs:
          wazuh_queue:
          wazuh_var_multigroups:
          wazuh_integrations:
          wazuh_active_response:
          wazuh_agentless:
          wazuh_wodles:
          filebeat_etc:
          filebeat_var:
          wazuh-indexer-data:
        EOF
    
    - name: Create custom Wazuh configuration
      raw: |
        cat << 'EOF' > /opt/wazuh/local_rules.xml
        <!-- Local rules for Wazuh -->
        <group name="local,">
          <rule id="100001" level="5">
            <if_sid>5710</if_sid>
            <description>Attempt to login using a non-existent user</description>
          </rule>
        </group>
        EOF
    
    - name: Start Wazuh using Docker Compose
      raw: cd /opt/wazuh && docker-compose up -d
    
    - name: Show Wazuh deployment info
      debug:
        msg: |
          Wazuh has been successfully deployed:
          
          - Wazuh Dashboard: https://{{ hostvars['alpine_vm']['ansible_host'] }}
            - Default credentials: admin/SecretPassword
          
          - Wazuh Manager: {{ hostvars['alpine_vm']['ansible_host'] }}:55000
          
          Please change the default passwords for production use.